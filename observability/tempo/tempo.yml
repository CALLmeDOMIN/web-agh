# Minimalna, monolityczna konfiguracja Tempo (single binary, storage na dysku).
server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:           # przyjmuje OTLP/HTTP na :4318
          endpoint: 0.0.0.0:4318
        grpc:           # przyjmuje OTLP/gRPC na :4317
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

# Generator metryk: Tempo z trace'ow wylicza metryki RED (span-metrics)
# oraz graf zaleznosci uslug (service-graphs) i wysyla je do Prometheusa.
# To daje "RED za darmo" bez instrumentacji metryk w aplikacji.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
