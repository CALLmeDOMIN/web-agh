# Demo "Praktyczna obserwowalnosc": LGTM (Loki, Grafana, Tempo, [Mimir~Prometheus]) + Prometheus
#
# Architektura sygnalow:
#   app  --/metrics-->  Prometheus            (METRYKI, pull)
#   app  --OTLP------->  Tempo                 (TRACE'Y, push)
#   app  --stdout--->  Alloy  --push-->  Loki  (LOGI)
#   Tempo --remote_write--> Prometheus         (span-metrics + service graph)
#   Grafana  <--  Prometheus / Loki / Tempo    (wizualizacja + korelacja)
#
# Start:  docker compose up -d --build
# Grafana: http://localhost:3000   (logowanie anonimowe, rola Admin)

services:
  # --- Aplikacja demo (zrodlo 3 sygnalow) -----------------------------------
  app:
    build: ./app
    environment:
      OTEL_SERVICE_NAME: demo-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      LOG_LEVEL: info
    ports:
      - "3001:3000"   # aplikacja na hoscie pod 3001 (3000 zajmuje Grafana)
    depends_on:
      - tempo

  # --- Generator ruchu (zeby wykresy "zyly" w trakcie prezentacji) ----------
  loadgen:
    image: curlimages/curl:8.11.1
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        while true; do
          curl -s app:3000/rolldice > /dev/null
          curl -s app:3000/slow > /dev/null
          curl -s app:3000/error > /dev/null
          curl -s app:3000/users/$$((RANDOM % 100)) > /dev/null
          sleep 1
        done
    depends_on:
      - app

  # --- Prometheus (METRYKI) -------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver        # przyjmuje remote_write z Tempo
      - --enable-feature=exemplar-storage          # przechowuje exemplars (metryka->trace)
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # --- Loki (LOGI) ----------------------------------------------------------
  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    ports:
      - "3100:3100"

  # --- Tempo (TRACE'Y) ------------------------------------------------------
  tempo:
    image: grafana/tempo:2.7.0
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    ports:
      - "3200:3200"   # API/Tempo UI
      - "4318:4318"   # OTLP/HTTP

  # --- Alloy (kolektor logow: Docker -> Loki) -------------------------------
  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
    depends_on:
      - loki

  # --- Grafana (wizualizacja + korelacja) -----------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Wlacza korelacje i graf uslug
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
